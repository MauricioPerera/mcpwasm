name = "llmstxt-gateway"
main = "worker-gateway.mjs"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Cuenta Mauricio.perera@gmail.com (fija la cuenta para modo no-interactivo).
account_id = "091122c40cc6f8d0d421cbc90e2caca8"

# Allowlist de origins permitidos (coma-separada). Inicial: el demo site.
[vars]
ALLOWED_ORIGINS = "https://llmstxt-demo-site.rckflr.workers.dev,https://llmstxt-bookstore.rckflr.workers.dev,https://llmstxt-docs.rckflr.workers.dev,https://mauricioperera.github.io"

# TAREA25: atestaciones (ext-skill-attestations v0.2). Registro de revisores
# (trust anchor, config del runtime): {attester: {public_key base64 raw 32
# bytes, registered_at}}. La publica firma las atestaciones que publica cada
# origin en /.well-known/agent-skills/attestations.json. Literal string TOML
# (comillas simples) para no escapar el JSON.
REVIEWERS = '{"human:mauricio":{"public_key":"YghuJivYSVI458jIjwXEKDLmQaG6X4Itn1VzBXa/ikw=","registered_at":"2026-07-02"},"human:mauricio-2":{"public_key":"y2997bXW70CNI5keR2UfNhNJYuXc1VCw1sQ9LDazrGo=","registered_at":"2026-07-06"}}'

# Modo de atestacion: "advisory" (expone veredicto, no excluye), "enforcing"
# (excluye las no-attested como un hash mismatch), "off" (comportamiento previo).
ATTESTATION_MODE = "enforcing"

# Tamano del pool de instancias del modulo asyncify por isolate (opcional).
# Cada request adquiere una instancia en exclusiva => hasta N requests en
# paralelo por isolate; el (N+1)-esimo espera FIFO. Default 4, clamp [1,8];
# con 1 se recupera la serializacion total previa (mutex de TAREA19). Subirlo
# aumenta paralelismo y memoria potencial (limite QuickJS 64MB por contexto).
# WASM_POOL_SIZE = "4"

# TAREA37: identidad por cliente (opt-in, retrocompatible). CLIENTS se define como
# SECRET (no como var aqui — nunca valores reales en texto plano):
#   wrangler secret put CLIENTS
# Valor: string JSON {sha256_hex_del_token: {"client_id": "nombre", "rpm": <numero_opcional>}}.
# La clave es el sha256 hex (minusculas) de los bytes UTF-8 del token (los tokens
# NUNCA aparecen en claro en config). Si CLIENTS esta definido y no vacio -> modo
# por-cliente: POST /mcp exige Authorization: Bearer <token>, se hashea y se hace
# lookup exacto en el registro; token conocido -> pasa + header X-Gw-Client:
# <client_id> en todas las respuestas de /mcp; token desconocido/header
# ausente/malformado -> 401. AUTH_TOKEN se IGNORA en este modo. Si CLIENTS esta
# definido pero su JSON es invalido -> FAIL-CLOSED (todo POST /mcp da 401). Sin
# CLIENTS -> comportamiento legado intacto (AUTH_TOKEN o modo dev). El campo rpm
# queda accesible en el registro para T38 (rate limiting) pero no se aplica todavia.

# Service binding al demo site. Un Worker no puede fetchear via workers.dev a
# otro Worker de la MISMA cuenta (error 1042); el binding DEMO lo resuelve
# (bypass de workers.dev). El gateway enruta el origin del demo por este
# binding (ver makeFetchImpl en worker-gateway.mjs) y al resto por fetch global.
[[services]]
binding = "DEMO"
service = "llmstxt-demo-site"

# Service binding al bookstore (mismo motivo que DEMO: misma cuenta -> error 1042).
[[services]]
binding = "BOOKSTORE"
service = "llmstxt-bookstore"

# Service binding al docs-site (TAREA22: mismo motivo, misma cuenta -> error 1042).
# El docs-site publica una linea skills-memory; el gateway descarga su snapshot
# por este binding y verifica snapshot_sha256 antes de inyectar memorySearch.
[[services]]
binding = "DOCS"
service = "llmstxt-docs"

# TAREA38: rate limiting por cliente (opt-in). Durable Object que lleva un contador
# de ventana fija por client_id (DO id por nombre = client_id) en storage
# SQLite-backed (new_sqlite_classes => funciona en todos los planes, no solo
# Workers Paid). El gateway solo invoca el DO si se cumplen las 3: modo por-cliente
# (env.CLIENTS) + cliente con rpm no-null + este binding presente. El binding se
# despliega con el worker; el limiter sigue inactivo hasta que exista un CLIENTS
# con rpm (sin binding o sin rpm el flujo queda byte-identico al previo).
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# Precalentamiento del descubrimiento (handler scheduled en worker-gateway.mjs):
# cada minuto corre discovery de todos los origins del allowlist (poblando L1
# del isolate y L2 del colo del cron) e instancia un modulo wasm del pool.
# Ataca el costo dominante medido en BENCHMARK.md (miss de descubrimiento
# ~250-400ms). Limite honesto: la Cache API es por colo y el cron corre en un
# solo punto de presencia; otros colos siguen pagando su primer miss. Costo:
# ~1 invocacion/min + un punado de subrequests. Borrar este bloque desactiva
# el preheat sin tocar codigo.
[triggers]
crons = ["* * * * *"]

# Regla de modulo para que el import "./quickjs-asyncify.wasm" se trate como
# WebAssembly.Module pre-compilado (CompiledWasm) en el build de wrangler.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false