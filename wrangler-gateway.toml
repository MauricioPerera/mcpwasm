name = "llmstxt-gateway"
main = "worker-gateway.mjs"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Cuenta Mauricio.perera@gmail.com (fija la cuenta para modo no-interactivo).
account_id = "091122c40cc6f8d0d421cbc90e2caca8"

# Allowlist de origins permitidos (coma-separada). Inicial: el demo site.
[vars]
ALLOWED_ORIGINS = "https://llmstxt-demo-site.rckflr.workers.dev,https://llmstxt-bookstore.rckflr.workers.dev,https://llmstxt-docs.rckflr.workers.dev"

# Service binding al demo site. Un Worker no puede fetchear via workers.dev a
# otro Worker de la MISMA cuenta (error 1042); el binding DEMO lo resuelve
# (bypass de workers.dev). El gateway enruta el origin del demo por este
# binding (ver makeFetchImpl en worker-gateway.mjs) y al resto por fetch global.
[[services]]
binding = "DEMO"
service = "llmstxt-demo-site"

# Service binding al bookstore (mismo motivo que DEMO: misma cuenta -> error 1042).
[[services]]
binding = "BOOKSTORE"
service = "llmstxt-bookstore"

# Service binding al docs-site (TAREA22: mismo motivo, misma cuenta -> error 1042).
# El docs-site publica una linea skills-memory; el gateway descarga su snapshot
# por este binding y verifica snapshot_sha256 antes de inyectar memorySearch.
[[services]]
binding = "DOCS"
service = "llmstxt-docs"

# Regla de modulo para que el import "./quickjs-asyncify.wasm" se trate como
# WebAssembly.Module pre-compilado (CompiledWasm) en el build de wrangler.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false